<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEC Display Simulator</title>
<style>
  :root {
    --bg: #1a1a2e; --card: #16213e; --border: #0f3460;
    --accent: #e94560; --ok: #4caf50; --warn: #ff9800; --muted: #7f8c8d;
    --text: #ecf0f1; --text2: #bdc3c7; --blue: #2196f3;
    --input-bg: #0d1b2a; --radius: 6px; --mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.5 system-ui, sans-serif; }

  header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  #ws-status { font-size: 12px; color: var(--muted); margin-left: auto; }
  #ws-status.connected { color: var(--ok); }

  main { display: grid; grid-template-columns: 1fr 380px; gap: 16px; padding: 16px; height: calc(100vh - 53px); }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
  .panel-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .panel-body { padding: 14px; overflow-y: auto; flex: 1; }

  /* Device cards */
  .device-grid { display: flex; flex-direction: column; gap: 14px; }
  .device-card {
    background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px;
  }
  .device-card.offline { border-color: var(--accent); opacity: 0.7; }
  .device-card.disconnected { border-color: var(--accent); opacity: 0.5; }
  .device-card.proxy-card { border-color: var(--blue); border-style: dashed; }
  .device-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ok); display: inline-block; flex-shrink: 0; }
  .dot.off { background: var(--muted); }
  .dot.warn { background: var(--warn); }

  /* Display + folder row */
  .display-row { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
  .display-panel {
    background: #000; border: 2px solid #333; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-family: var(--mono); font-size: 14px;
    text-align: center; overflow: hidden; flex-shrink: 0;
    position: relative;
  }
  .display-panel.landscape { width: 240px; aspect-ratio: 16/9; }
  .display-panel.portrait  { width: 120px; aspect-ratio: 9/16; }
  .display-panel.powered-off { border-color: #222; }
  .display-panel.powered-off .display-content { opacity: 0.15; }
  .display-content {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; height: 100%; padding: 8px;
  }
  .display-input { font-size: 20px; font-weight: 700; color: #555; }
  .display-folder { font-size: 12px; color: var(--ok); }
  .display-label { font-size: 10px; color: #444; margin-top: 2px; }
  .display-playing { color: var(--ok); font-size: 16px; font-weight: 700; }
  .display-idle { color: #444; font-size: 13px; }

  /* Folder listing */
  .folder-listing { flex: 1; min-width: 0; max-height: 200px; overflow-y: auto; }
  .folder-listing h4 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .folder-entry { font-size: 12px; font-family: var(--mono); padding: 2px 0; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .folder-entry .fe-icon { margin-right: 4px; }
  .folder-entry .fe-count { color: var(--muted); font-size: 11px; margin-left: 4px; }

  /* Info fields grid */
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; margin-bottom: 8px; }
  .field { font-size: 12px; }
  .field label { color: var(--muted); display: block; font-size: 11px; margin-bottom: 1px; }
  .field span { color: var(--text); font-family: var(--mono); font-size: 12px; }

  .device-actions { display: flex; flex-wrap: wrap; gap: 6px; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }

  /* Fault Injection Section */
  .fault-section { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
  .fault-section h4 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .fault-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .fault-row label { font-size: 12px; color: var(--text2); }

  /* Buttons */
  button {
    padding: 5px 11px; border: 1px solid var(--border); background: var(--card);
    color: var(--text); border-radius: 4px; cursor: pointer; font-size: 12px;
    transition: background .15s;
  }
  button:hover { background: var(--border); }
  button.danger { border-color: var(--accent); color: var(--accent); }
  button.danger:hover { background: rgba(233,69,96,.15); }
  button.primary { border-color: var(--ok); color: var(--ok); }
  button.primary:hover { background: rgba(76,175,80,.15); }
  button.warn { border-color: var(--warn); color: var(--warn); }
  button.warn:hover { background: rgba(255,152,0,.15); }
  button.blue { border-color: var(--blue); color: var(--blue); }
  button.blue:hover { background: rgba(33,150,243,.15); }
  button.sm { padding: 3px 8px; font-size: 11px; }

  /* Inputs */
  input[type=number], input[type=text], select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; padding: 4px 8px; font-size: 12px; width: 80px;
  }
  select { width: auto; }

  /* Log panel */
  #log-panel { font-family: var(--mono); font-size: 11px; color: var(--text2); }
  .log-line { border-bottom: 1px solid rgba(15,52,96,.4); padding: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-line:hover { background: rgba(255,255,255,.03); }
  .log-ts { color: var(--muted); margin-right: 6px; }

  /* Badge */
  .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; }
  .badge.on  { background: rgba(76,175,80,.2); color: var(--ok); }
  .badge.off { background: rgba(127,140,141,.15); color: var(--muted); }
  .badge.em  { background: rgba(233,69,96,.2); color: var(--accent); }
  .badge.cable-on { background: rgba(33,150,243,.2); color: var(--blue); }
  .badge.cable-off { background: rgba(233,69,96,.2); color: var(--accent); }
  .badge.proxy { background: rgba(33,150,243,.15); color: var(--blue); }

  #log-panel-wrap { display: flex; flex-direction: column; }
  .log-controls { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  #log-filter { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 4px 8px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>NEC Display Simulator</h1>
  <span id="ws-status">connecting…</span>
</header>
<main>
  <!-- Left: device cards -->
  <div class="panel">
    <div class="panel-header">Virtual Devices</div>
    <div class="panel-body">
      <div class="device-grid" id="device-grid">
        <p style="color:var(--muted)">Connecting to simulator…</p>
      </div>
    </div>
  </div>

  <!-- Right: log -->
  <div class="panel" id="log-panel-wrap">
    <div class="panel-header">Command Log <span id="log-count" style="font-weight:400;color:var(--muted);font-size:11px;margin-left:auto"></span></div>
    <div class="log-controls">
      <input type="text" id="log-filter" placeholder="filter…">
      <button onclick="clearLogDisplay()">Clear</button>
    </div>
    <div class="panel-body" id="log-panel"></div>
  </div>
</main>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let devices = [];
let logLines = [];
let wsOk = false;

const INPUT_NAMES = {
  0x0F: 'DP1', 0x10: 'DP2', 0x11: 'HDMI1', 0x12: 'HDMI2',
  0x87: 'MediaPlayer',
};
function inputName(v) {
  return INPUT_NAMES[v] ?? `0x${v.toString(16).toUpperCase()}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────────────────────────────────────
let ws;
function connectWS() {
  ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    wsOk = true;
    document.getElementById('ws-status').textContent = 'connected';
    document.getElementById('ws-status').classList.add('connected');
  };

  ws.onclose = () => {
    wsOk = false;
    document.getElementById('ws-status').textContent = 'disconnected';
    document.getElementById('ws-status').classList.remove('connected');
    setTimeout(connectWS, 2000);
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'init') {
        devices  = msg.devices;
        logLines = msg.logs || [];
        renderDevices();
        renderLogs(logLines);
      } else if (msg.type === 'log') {
        logLines.push(msg.line);
        if (logLines.length > 500) logLines.shift();
        appendLog(msg.line);
        updateLogCount();
      } else if (msg.type === 'device-update') {
        const idx = devices.findIndex(d => d.id === msg.device.id);
        if (idx >= 0) devices[idx] = msg.device;
        else devices.push(msg.device);
        renderDevice(msg.device);
      }
    } catch {}
  };
}
connectWS();

// ─────────────────────────────────────────────────────────────────────────────
// REST
// ─────────────────────────────────────────────────────────────────────────────
async function apiPut(id, body) {
  const r = await fetch(`/api/devices/${encodeURIComponent(id)}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

async function resetFs(id) {
  await fetch(`/api/devices/${encodeURIComponent(id)}/fs`, { method: 'PUT' });
}

// ─────────────────────────────────────────────────────────────────────────────
// Render helpers
// ─────────────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function powerBadge(p) {
  if (p === 'on') return `<span class="badge on">on</span>`;
  if (p === 'off') return `<span class="badge off">off</span>`;
  return `<span class="badge off">${esc(p)}</span>`;
}

/** Determine what the display panel should show */
function getDisplayContent(d) {
  if (d.connected === false) {
    return `<div class="display-input" style="color:#555">NO SIGNAL</div>`;
  }
  if (d.power === 'off' || d.power === 'standby') {
    return `<div class="display-input" style="color:#222">${esc(d.power).toUpperCase()}</div>`;
  }
  if (d.emergency) {
    return `<div class="display-playing" style="color:var(--accent)">EMERGENCY</div>
            <div class="display-label">contents active</div>`;
  }
  const input = d.input;
  if (input === 0x87) {
    // Media Player active
    const folder = d.player?.autoPlayFolder;
    if (folder && d.player?.autoPlayMode === 1) {
      const name = folder.split('/').pop();
      return `<div class="display-playing">${esc(name)}</div>
              <div class="display-label">slideshow active</div>`;
    }
    return `<div class="display-idle">MediaPlayer</div>
            <div class="display-label">idle</div>`;
  }
  // External input
  return `<div class="display-input">${esc(inputName(input))}</div>
          <div class="display-label">external input</div>`;
}

/** Build folder listing HTML */
function renderFolderList(d) {
  const files = d.rootFiles || [];
  if (!files.length) {
    if (d.mode === 'proxy') return '<h4>SD Card</h4><div class="folder-entry" style="color:var(--muted)">not available</div>';
    return '<h4>SD Card</h4><div class="folder-entry" style="color:var(--muted)">empty</div>';
  }
  let html = '<h4>SD Card Contents</h4>';
  for (const f of files) {
    if (f.type === 0) {
      // Folder
      const count = f.fileCount || 0;
      html += `<div class="folder-entry"><span class="fe-icon">📁</span>${esc(f.name)}<span class="fe-count">(${count} file${count !== 1 ? 's' : ''})</span></div>`;
    } else {
      // File
      const sizeKB = Math.ceil((f.size || 0) / 1024);
      html += `<div class="folder-entry"><span class="fe-icon">📄</span>${esc(f.name)}<span class="fe-count">${sizeKB}KB</span></div>`;
    }
  }
  return html;
}

// ─────────────────────────────────────────────────────────────────────────────
// Render devices
// ─────────────────────────────────────────────────────────────────────────────
function renderDevices() {
  const grid = document.getElementById('device-grid');
  grid.innerHTML = '';
  for (const d of devices) {
    const div = document.createElement('div');
    div.id = `dev-${d.id}`;
    grid.appendChild(div);
    renderDevice(d);
  }
}

function renderDevice(d) {
  const el = document.getElementById(`dev-${d.id}`);
  if (!el) { renderDevices(); return; }

  const isEm       = d.emergency;
  const isCableOff = d.connected === false;
  const isProxy    = d.mode === 'proxy';
  const isPoweredOff = d.power === 'off' || d.power === 'standby';
  const dotClass   = isCableOff ? 'off' : (d.power === 'on' ? (isEm ? 'warn' : '') : 'off');
  const orient     = d.orientation || 'landscape';
  const pl         = d.player || {};

  let cardClass = 'device-card';
  if (isProxy) cardClass += ' proxy-card';
  if (isCableOff) cardClass += ' disconnected';
  else if (isPoweredOff) cardClass += ' offline';

  el.className = cardClass;

  // ── Header ──
  let badges = powerBadge(d.power);
  if (isProxy) {
    badges += ' <span class="badge proxy">PROXY</span>';
  }
  if (isCableOff) {
    badges += ' <span class="badge cable-off">DISCONNECTED</span>';
  } else if (!isProxy) {
    badges += ' <span class="badge cable-on">LINKED</span>';
  }
  if (isEm) badges += ' <span class="badge em">EMERGENCY</span>';

  // ── Display panel ──
  const displayClass = `display-panel ${orient}${isPoweredOff || isCableOff ? ' powered-off' : ''}`;
  const displayContent = getDisplayContent(d);

  // ── Folder listing ──
  const folderHtml = renderFolderList(d);

  // ── Actions (simulated devices only) ──
  let actionsHtml = '';
  if (!isProxy) {
    actionsHtml = `
    <div class="device-actions">
      <button class="primary sm" onclick="setPower('${esc(d.id)}', 'on')">Power On</button>
      <button class="danger sm"  onclick="setPower('${esc(d.id)}', 'off')">Power Off</button>
      <button class="sm" onclick="setPower('${esc(d.id)}', 'standby')">Standby</button>
      <button class="sm" onclick="resetFs('${esc(d.id)}')">Reset FS</button>
      ${isCableOff
        ? `<button class="primary sm" onclick="setCable('${esc(d.id)}', true)">Connect Cable</button>`
        : `<button class="danger sm" onclick="setCable('${esc(d.id)}', false)">Disconnect Cable</button>`
      }
      <button class="blue sm" onclick="toggleOrientation('${esc(d.id)}')">${orient === 'landscape' ? '↻ Portrait' : '↺ Landscape'}</button>
    </div>`;
  } else {
    // Proxy: only orientation toggle
    actionsHtml = `
    <div class="device-actions">
      <button class="blue sm" onclick="toggleOrientation('${esc(d.id)}')">${orient === 'landscape' ? '↻ Portrait' : '↺ Landscape'}</button>
    </div>`;
  }

  // ── Fault injection (simulated only) ──
  let faultHtml = '';
  if (!isProxy) {
    faultHtml = `
    <div class="fault-section">
      <h4>Fault Injection</h4>
      <div class="fault-row">
        <label>Reply delay (ms):</label>
        <input type="number" min="0" max="30000" value="${esc(d.replyDelayMs)}"
          onchange="setDelay('${esc(d.id)}', this.value)">
        <label>HTML-after-RSG (ms):</label>
        <input type="number" min="0" max="30000" value="${esc(pl.serveHtmlFor ?? 0)}"
          onchange="setServeHtmlFor('${esc(d.id)}', this.value)">
      </div>
      <div class="fault-row" style="margin-top:8px">
        <button class="warn sm" onclick="triggerRestart('${esc(d.id)}')">Trigger Player Restart</button>
        <button class="warn sm" onclick="setFirmware('${esc(d.id)}')">Wrong Firmware</button>
        <button class="sm" onclick="resetFirmware('${esc(d.id)}')">Correct Firmware</button>
      </div>
    </div>`;
  }

  el.innerHTML = `
    <div class="device-name">
      <span class="dot ${esc(dotClass)}"></span>
      ${esc(d.name)}
      ${badges}
    </div>

    <div class="display-row">
      <div class="${esc(displayClass)}">
        <div class="display-content">${displayContent}</div>
      </div>
      <div class="folder-listing">${folderHtml}</div>
    </div>

    <div class="fields-grid">
      <div class="field"><label>TV IP</label><span>${esc(d.tvIP || '—')}</span></div>
      <div class="field"><label>Player IP</label><span>${esc(d.playerIP || '—')}</span></div>
      <div class="field"><label>MAC</label><span>${esc(d.mac)}</span></div>
      <div class="field"><label>Model / Firmware</label><span>${esc(d.model || '?')} / ${esc(d.firmware || '?')}</span></div>
      <div class="field"><label>Input</label><span>${esc(inputName(d.input))} (0x${d.input.toString(16).toUpperCase()})</span></div>
      <div class="field"><label>Orientation</label><span>${esc(orient)}</span></div>
      ${!isProxy ? `
      <div class="field"><label>AutoPlay folder</label><span>${esc(pl.autoPlayFolder || '—')}</span></div>
      <div class="field"><label>AutoPlay mode</label><span>${pl.autoPlayMode ?? '—'}</span></div>
      ` : ''}
    </div>

    ${actionsHtml}
    ${faultHtml}
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────────────────────────────────────
async function setPower(id, power) {
  await apiPut(id, { power });
}

async function setCable(id, connected) {
  await fetch(`/api/devices/${encodeURIComponent(id)}/cable`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ connected }),
  });
}

async function toggleOrientation(id) {
  const d = devices.find(x => x.id === id);
  if (!d) return;
  const newOrient = (d.orientation || 'landscape') === 'landscape' ? 'portrait' : 'landscape';
  await apiPut(id, { orientation: newOrient });
}

async function setDelay(id, ms) {
  await apiPut(id, { replyDelayMs: parseInt(ms) || 0 });
}

async function setServeHtmlFor(id, ms) {
  await apiPut(id, { serveHtmlFor: parseInt(ms) || 0 });
}

async function triggerRestart(id) {
  const d = devices.find(x => x.id === id);
  if (!d) return;
  if (!d.player?.serveHtmlFor) {
    // Default 3s if not configured
    await apiPut(id, { serveHtmlFor: 3000 });
  }
  await apiPut(id, { triggerRestart: true });
}

async function setFirmware(id) {
  await apiPut(id, { firmware: '99X9.999' });
}

async function resetFirmware(id) {
  await apiPut(id, { firmware: '00R3.400' });
}

// ─────────────────────────────────────────────────────────────────────────────
// Log
// ─────────────────────────────────────────────────────────────────────────────
const logPanel  = document.getElementById('log-panel');
const logFilter = document.getElementById('log-filter');
let logDisplayCount = 0;

function matchesFilter(line) {
  const f = logFilter.value.trim().toLowerCase();
  return !f || line.toLowerCase().includes(f);
}

function renderLogs(lines) {
  logPanel.innerHTML = '';
  logDisplayCount = 0;
  for (const l of lines) appendLog(l);
  updateLogCount();
}

function appendLog(line) {
  if (!matchesFilter(line)) return;
  const div = document.createElement('div');
  div.className = 'log-line';
  // Colour timestamp differently
  const tsEnd = line.indexOf(' ', 12);
  const ts    = tsEnd > 0 ? line.slice(0, tsEnd) : '';
  const rest  = tsEnd > 0 ? line.slice(tsEnd + 1) : line;
  div.innerHTML = `<span class="log-ts">${esc(ts)}</span>${esc(rest)}`;
  logPanel.appendChild(div);
  logDisplayCount++;
  // Auto-scroll
  logPanel.scrollTop = logPanel.scrollHeight;
  // Trim excess
  while (logPanel.children.length > 500) {
    logPanel.removeChild(logPanel.firstChild);
  }
}

function updateLogCount() {
  document.getElementById('log-count').textContent = `${logDisplayCount} lines`;
}

function clearLogDisplay() {
  logPanel.innerHTML = '';
  logDisplayCount = 0;
  updateLogCount();
}

logFilter.addEventListener('input', () => renderLogs(logLines));
</script>
</body>
</html>
