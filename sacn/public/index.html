<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMX Console</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e2e">
    <script src="./qrcode.min.js"></script>
    <style>
        body {
            background-color: #11111b; /* Matches the dark theme */
            color: #cdd6f4;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Log UI Styles */
        #log-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 30vh;
            background: rgba(30, 30, 46, 0.95);
            border-top: 2px solid #45475a;
            display: none; /* Hidden by default */
            flex-direction: column;
            z-index: 1000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        
        #log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: #313244;
            font-family: monospace;
            font-size: 0.9em;
            font-weight: bold;
            border-bottom: 1px solid #45475a;
        }
        
        #close-log-btn {
            cursor: pointer;
            color: #f38ba8;
            font-size: 1.2em;
            line-height: 1;
        }
        
        #network-log {
            margin: 0;
            padding: 10px 15px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85em;
            flex-grow: 1;
            white-space: pre-wrap;
        }
        
        #toggle-log-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: #313244;
            color: #a6adc8;
            border: 1px solid #45475a;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            z-index: 999;
            opacity: 0.4;
            transition: all 0.2s;
        }
        
        #toggle-log-btn:hover {
            opacity: 1;
            background: #45475a;
            color: white;
        }

        /* Syntax Highlighting for Log Output */
        .log-time { color: #89b482; margin-right: 8px; }
        .log-info { color: #89dceb; }
        .log-warn { color: #fab387; }
        .log-error { color: #f38ba8; }
        .log-sync { color: #cba6f7; }
    </style>
</head>
<body>

    <dmx-console></dmx-console>
    
    <button id="toggle-log-btn">Show Log</button>

    <div id="log-container">
        <div id="log-header">
            <span>Network Log</span>
            <span id="close-log-btn">&times;</span>
        </div>
        <pre id="network-log"></pre>
    </div>

    <script src="./dmx-console.js"></script>
    <script src="./app.js"></script>
</body>
</html>
