<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEC Monitor Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg:      #0a0c0f;
    --surface: #111318;
    --border:  #1e2230;
    --accent:  #00e5a0;
    --accent2: #0088ff;
    --warn:    #ff9500;
    --danger:  #ff3b30;
    --ok:      #00e5a0;
    --text:    #c8d0e0;
    --text-primary: #c8d0e0;
    --text-dim: #4a5270;
    --muted:   #4a5270;
    --bg-input: #0a0c0f;
    --mono:    'IBM Plex Mono', monospace;
    --sans:    'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; }

  body { display: grid; grid-template-rows: 48px 1fr; grid-template-columns: 1fr 340px; height: 100vh; overflow: hidden; }
  #content-area { overflow-y: auto; display: flex; flex-direction: column; }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  header .logo { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .15em; color: var(--accent); text-transform: uppercase; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  header .dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  header input[type=text] { font-family: var(--mono); font-size: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; width: 200px; outline: none; }
  header input[type=text]:focus { border-color: var(--accent2); }
  header input[type=number] { font-family: var(--mono); font-size: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; width: 70px; outline: none; }
  header label { color: var(--muted); font-size: 11px; }
  header .spacer { flex: 1; }

  /* ── Buttons ── */
  button { cursor: pointer; font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: 6px 14px; border-radius: 4px; border: 1px solid transparent; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary:hover { background: #00ffc0; }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-secondary:disabled { opacity: .35; cursor: not-allowed; }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-warn { background: transparent; color: var(--warn); border-color: var(--warn); }
  .btn-warn:hover { background: var(--warn); color: #000; }

  /* ── Main ── */
  main { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  #scanner-wrap { padding: 12px 20px 0; }

  /* ── Log panel ── */
  #log-panel {
    grid-row: 2;
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #log-panel .log-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  #log-panel .log-header span { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }
  #log-entries { flex: 1; overflow-y: auto; padding: 8px 0; font-family: var(--mono); font-size: 11px; line-height: 1.7; }
  .log-entry { padding: 2px 14px; display: flex; gap: 8px; border-left: 2px solid transparent; }
  .log-entry.info  { border-color: var(--accent2); color: var(--text); }
  .log-entry.warn  { border-color: var(--warn);    color: var(--warn); }
  .log-entry.error { border-color: var(--danger);  color: var(--danger); }
  .log-entry .lts  { color: var(--muted); flex-shrink: 0; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }
  .card-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .card-header h2 { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); flex: 1; }
  .card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── Grid of settings ── */
  .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .setting-item { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .setting-item label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
  .setting-item .val { font-family: var(--mono); font-size: 18px; color: var(--text); }
  .setting-item .val-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .setting-item .controls { display: flex; gap: 6px; align-items: center; }
  .setting-item input[type=range] { flex: 1; accent-color: var(--accent); }
  .setting-item input[type=number] { font-family: var(--mono); font-size: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; width: 70px; outline: none; }
  .setting-item input[type=number]:focus { border-color: var(--accent2); }

  /* ── Status badge ── */
  .badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 3px; }
  .badge-green  { background: rgba(0,229,160,.1); color: var(--accent); border: 1px solid rgba(0,229,160,.3); }
  .badge-blue   { background: rgba(0,136,255,.1); color: var(--accent2); border: 1px solid rgba(0,136,255,.3); }
  .badge-yellow { background: rgba(255,149,0,.1);  color: var(--warn);   border: 1px solid rgba(255,149,0,.3); }
  .badge-red    { background: rgba(255,59,48,.1);  color: var(--danger); border: 1px solid rgba(255,59,48,.3); }
  .badge-grey   { background: rgba(74,82,112,.2);  color: var(--muted);  border: 1px solid var(--border); }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; }
  th { text-align: left; padding: 6px 10px; color: var(--muted); border-bottom: 1px solid var(--border); letter-spacing: .08em; font-weight: 400; }
  td { padding: 7px 10px; border-bottom: 1px solid rgba(30,34,48,.6); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  /* ── Form row ── */
  .form-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 10px; font-family: var(--mono); color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
  .form-group input, .form-group select {
    font-family: var(--mono); font-size: 12px;
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 8px; border-radius: 4px; outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent2); }
  select option { background: var(--bg); }

  /* ── Misc ── */
  .error-text { color: var(--danger); font-family: var(--mono); font-size: 11px; }
  .ok-text    { color: var(--accent);  font-family: var(--mono); font-size: 11px; }
  .kv-grid    { display: grid; grid-template-columns: 140px 1fr; gap: 4px 12px; font-size: 12px; }
  .kv-label   { color: var(--muted); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; display: flex; align-items: center; }
  .kv-value   { color: var(--text); font-family: var(--mono); }
  .mono { font-family: var(--mono); }
  .flex-gap { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  hr { border: none; border-top: 1px solid var(--border); }
  #not-connected { color: var(--muted); font-family: var(--mono); font-size: 13px; text-align: center; padding: 40px; }

  /* ── Asset thumbnail grid ── */
  .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .asset-card { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; display: flex; flex-direction: column; }
  .asset-thumb { width: 100%; aspect-ratio: 16/9; object-fit: contain; background: #000; cursor: pointer; display: block; }
  .asset-thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: #111; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 22px; }
  .asset-card-body { padding: 6px 8px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .asset-name { font-family: var(--mono); font-size: 10px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-meta { font-size: 9px; color: var(--muted); }

  /* ── Lightbox ── */
  #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out; }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px; cursor: default; box-shadow: 0 8px 40px rgba(0,0,0,.8); }
  #lightbox-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; opacity: .7; line-height: 1; }
  #lightbox-close:hover { opacity: 1; }
</style>
</head>
<body>

<header>
  <span class="logo">NEC&nbsp;Control</span>
  <span class="dot" id="status-dot"></span>
  <label>Host</label>
  <input type="text"   id="inp-host"      placeholder="192.168.1.100" value="">
  <label>Port</label>
  <input type="number" id="inp-port"      placeholder="7142" value="7142" min="1" max="65535">
  <label>Monitor ID</label>
  <input type="number" id="inp-monitor-id" placeholder="1" value="1" min="1" max="100">
  <button class="btn-primary"    id="btn-connect"     onclick="connect()">Connect</button>
  <button class="btn-secondary"  id="btn-interrogate" onclick="interrogate()" disabled>Interrogate All</button>
  <button class="btn-danger"     id="btn-disconnect"  onclick="disconnect()" disabled>Disconnect</button>
  <span class="spacer"></span>
  <span id="session-label" style="font-family:var(--mono);font-size:10px;color:var(--muted)"></span>
</header>

<div id="content-area">
  <div id="scanner-wrap">
    <div class="card" id="card-scanner"></div>
  </div>
  <main id="main">
    <div id="not-connected">Connect to a monitor to begin testing.</div>
  </main>
</div>

<div id="log-panel">
  <div class="log-header">
    <span>Protocol Log</span>
    <button class="btn-secondary" style="padding:3px 8px;font-size:10px" onclick="clearLog()">Clear</button>
  </div>
  <div id="log-entries"></div>
</div>

<div id="lightbox" onclick="closeLightbox(event)">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ─── state ─────────────────────────────────────────────────────────────────

let sessionId       = null;
let monitorId       = 1;
let ws              = null;
let lastData        = {};
let deviceOnlineMap = {};      // { mac → { ip, power, name, ... } }
let expandedDevice  = null;    // { mac } of currently expanded device card

// ─── websocket log & device status ──────────────────────────────────────────

function initWs() {
  ws = new WebSocket('ws://' + location.host);
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'log') addLog(msg.entry);
    if (msg.type === 'device-online') {
      deviceOnlineMap[msg.mac] = { ip: msg.ip, power: msg.power, name: msg.name };
      updateDeviceOnlineStatus(msg.mac);
    }
    if (msg.type === 'device-offline') {
      delete deviceOnlineMap[msg.mac];
      const macId = msg.mac.replace(/:/g, '');
      const el = document.getElementById('am-dev-status-' + macId);
      if (el) el.innerHTML = `<span style="color:var(--muted)">○</span> offline`;
    }
  };
  ws.onclose = () => setTimeout(initWs, 2000);
}
initWs();

function addLog({ level, msg, data, ts }) {
  const el   = document.getElementById('log-entries');
  const d    = document.createElement('div');
  d.className = 'log-entry ' + level;
  const t    = new Date(ts).toTimeString().slice(0,8);
  d.innerHTML = '<span class="lts">' + t + '</span><span>' + esc(msg) + (data ? ' ' + esc(JSON.stringify(data)) : '') + '</span>';
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function clearLog() { document.getElementById('log-entries').innerHTML = ''; }

function updateDeviceOnlineStatus(mac) {
  const macId = mac.replace(/:/g, '');
  const el    = document.getElementById('am-dev-status-' + macId);
  const info  = deviceOnlineMap[mac];
  if (!el || !info) return;
  el.innerHTML = `<span style="color:var(--accent)">●</span> ${esc(info.name || info.ip || mac)}`;
}

function toggleDeviceExpand(mac) {
  const macId = mac.replace(/:/g, '');
  const contentEl = document.getElementById('am-dev-content-' + macId);
  if (!contentEl) return;
  const isExpanded = contentEl.style.display !== 'none';
  // Close any other expanded device
  if (!isExpanded && expandedDevice && expandedDevice !== mac) {
    const otherMacId = expandedDevice.replace(/:/g, '');
    const otherEl = document.getElementById('am-dev-content-' + otherMacId);
    if (otherEl) otherEl.style.display = 'none';
  }
  contentEl.style.display = isExpanded ? 'none' : 'block';
  expandedDevice = isExpanded ? null : mac;
}

// ─── api helpers ────────────────────────────────────────────────────────────

async function api(path, body, method) {
  if (!method || method === 'POST') {
    const r = await fetch('/api' + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, monitorId, ...body }),
    });
    const json = await r.json();
    if (json.error) throw new Error(json.error);
    return json;
  }
  // GET (no body)
  const r = await fetch('/api' + path, { method });
  const json = await r.json();
  if (json.error) throw new Error(json.error);
  return json;
}

// ─── connect / disconnect ───────────────────────────────────────────────────

async function connect() {
  const host = document.getElementById('inp-host').value.trim();
  if (!host) { alert('Enter a host IP or hostname'); return; }
  const port = parseInt(document.getElementById('inp-port').value) || 7142;
  monitorId  = parseInt(document.getElementById('inp-monitor-id').value) || 1;

  document.getElementById('btn-connect').disabled = true;
  try {
    const r = await fetch('/api/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ host, port, monitorId }),
    });
    const json = await r.json();
    if (json.error) throw new Error(json.error);
    sessionId = json.sessionId;
    document.getElementById('status-dot').classList.add('live');
    document.getElementById('session-label').textContent = 'session ' + sessionId;
    document.getElementById('btn-connect').disabled     = true;
    document.getElementById('btn-disconnect').disabled  = false;
    document.getElementById('btn-interrogate').disabled = false;
    renderUI();
    interrogate();
  } catch(e) {
    alert('Connect failed: ' + e.message);
    document.getElementById('btn-connect').disabled = false;
  }
}

async function disconnect() {
  if (!sessionId) return;
  await fetch('/api/connect/' + sessionId, { method: 'DELETE' });
  sessionId = null;
  document.getElementById('status-dot').classList.remove('live');
  document.getElementById('session-label').textContent = '';
  document.getElementById('btn-connect').disabled     = false;
  document.getElementById('btn-disconnect').disabled  = true;
  document.getElementById('btn-interrogate').disabled = true;
  document.getElementById('main').innerHTML = '<div id="not-connected">Connect to a monitor to begin testing.</div>';
}

// ─── interrogate ────────────────────────────────────────────────────────────

async function interrogate() {
  try {
    const data = await api('/interrogate');
    lastData = data;
    populateUI(data);
  } catch(e) {
    console.error(e);
  }
}

// ─── render skeleton ────────────────────────────────────────────────────────

function renderUI() {
  document.getElementById('main').innerHTML = `
  <div class="card" id="card-overview"></div>
  <div class="card" id="card-image"></div>
  <div class="card" id="card-power"></div>
  <div class="card" id="card-vcp-custom"></div>
  <div class="card" id="card-timing"></div>
  <div class="card" id="card-asset"></div>
  <div class="card" id="card-input"></div>
  <div class="card" id="card-diag"></div>
  <div class="card" id="card-emergency"></div>
  <div class="card" id="card-player"></div>
  <div class="card" id="card-osd"></div>
  <div class="card" id="card-upload"></div>
  `;
}

// ─── populate all cards ─────────────────────────────────────────────────────

function populateUI(data) {
  renderOverview(data);
  renderImageControls(data.vcp || {});
  renderPower(data.power || {});
  renderVcpCustom();
  renderInput(data.vcp?.inputSource || {});
  renderTiming(data.timing || {});
  renderAsset(data.asset || {});
  renderDiag(data.selfDiag, data.vcp?.tempSensor, data.vcp?.ambientLight, data.vcp?.powerMode);
  renderEmergency();
  renderPlayer();
  renderOsd(data.vcp?.infoOsd || {});
  renderUpload();
}

// ─── overview ───────────────────────────────────────────────────────────────

function renderOverview(data) {
  const p = data.power   || {};
  const t = data.timing  || {};
  const modeBadge = { on:'badge-green', standby:'badge-yellow', suspend:'badge-yellow', off:'badge-red' };
  const model    = data.model?.modelName   || '—';
  const serial   = data.serial?.serial     || '—';
  const firmware = data.firmware?.version  || '—';
  const mac      = data.mac?.mac           || '—';

  const POWER_MODE = { 1:'On', 2:'Standby', 3:'Suspend', 4:'Off', 5:'Hard Off' };
  const pmVal  = data.vcp?.powerMode?.current;
  const pmStr  = pmVal != null ? (POWER_MODE[pmVal] ?? ('0x' + pmVal.toString(16))) : '—';

  document.getElementById('card-overview').innerHTML = `
  <div class="card-header"><h2>Monitor Status</h2>
    <button class="btn-secondary" onclick="doInterrogate()">↻ Refresh All</button>
  </div>
  <div class="card-body">
    <div class="settings-grid">
      <div class="setting-item">
        <label>Power</label>
        <div class="val"><span class="badge ${modeBadge[p.modeStr] || 'badge-grey'}">${p.modeStr || '—'}</span></div>
      </div>
      <div class="setting-item">
        <label>Power Mode</label>
        <div class="val">${pmStr}</div>
      </div>
      <div class="setting-item">
        <label>H Frequency</label>
        <div class="val">${t.hFreqKHz ? t.hFreqKHz.toFixed(2) : '—'}<span style="font-size:12px;margin-left:4px;color:var(--muted)">kHz</span></div>
      </div>
      <div class="setting-item">
        <label>V Frequency</label>
        <div class="val">${t.vFreqHz ? t.vFreqHz.toFixed(2) : '—'}<span style="font-size:12px;margin-left:4px;color:var(--muted)">Hz</span></div>
      </div>
      <div class="setting-item">
        <label>Sync</label>
        <div class="val"><span class="badge ${t.syncPresent ? 'badge-green' : 'badge-grey'}">${t.syncPresent ? 'Present' : (t.syncPresent===false ? 'None' : '—')}</span></div>
      </div>
      <div class="setting-item">
        <label>Model</label>
        <div class="val" style="font-size:13px">${esc(model)}</div>
      </div>
      <div class="setting-item">
        <label>Serial</label>
        <div class="val" style="font-size:13px">${esc(serial)}</div>
      </div>
      <div class="setting-item">
        <label>Firmware</label>
        <div class="val" style="font-size:13px">${esc(firmware)}</div>
      </div>
      <div class="setting-item">
        <label>MAC Address</label>
        <div class="val" style="font-size:13px">${esc(mac)}</div>
      </div>
    </div>
  </div>`;
}

// ─── image controls (sliders) ───────────────────────────────────────────────

function renderImageControls(vcp) {
  const sliders = [
    { name:'brightness', label:'Brightness', opPage:0x00, opCode:0x10 },
    { name:'contrast',   label:'Contrast',   opPage:0x00, opCode:0x12 },
    { name:'sharpness',  label:'Sharpness',  opPage:0x00, opCode:0x87 },
    { name:'volume',     label:'Volume',     opPage:0x00, opCode:0x62 },
    { name:'redGain',    label:'Red Gain',   opPage:0x00, opCode:0x16 },
    { name:'greenGain',  label:'Green Gain', opPage:0x00, opCode:0x18 },
    { name:'blueGain',   label:'Blue Gain',  opPage:0x00, opCode:0x1A },
  ];

  const items = sliders.map(s => {
    const v   = vcp[s.name];
    const cur = v?.current ?? 0;
    const max = v?.max     ?? 100;
    const err = v?.error;
    return `
    <div class="setting-item" id="item-${s.name}">
      <label>${s.label}</label>
      ${err ? '<span class="error-text">' + esc(err) + '</span>' : `
      <div class="val" id="val-${s.name}">${cur}</div>
      <div class="val-sub">max ${max}</div>
      <div class="controls">
        <input type="range" id="range-${s.name}" min="0" max="${max}" value="${cur}"
          oninput="document.getElementById('val-${s.name}').textContent=this.value"
          onchange="setVcp(${s.opPage},${s.opCode},+this.value,'val-${s.name}')">
      </div>`}
    </div>`;
  }).join('');

  document.getElementById('card-image').innerHTML = `
  <div class="card-header"><h2>Image Controls</h2>
    <button class="btn-secondary" onclick="refreshImageControls()">↻ Refresh</button>
  </div>
  <div class="card-body"><div class="settings-grid">${items}</div></div>`;
}

// ─── diagnostics (self-diag, temperature, ambient light, power mode) ──────────

const POWER_MODE_LABELS = { 1:'On', 2:'Standby', 3:'Suspend', 4:'Off', 5:'Hard Off' };

function renderDiag(selfDiag, tempSensor, ambientLight, powerMode) {
  // Self-diagnosis
  let diagHtml = '';
  if (!selfDiag || selfDiag.error) {
    diagHtml = '<span class="error-text">' + esc(selfDiag?.error ?? 'No data') + '</span>';
  } else if (selfDiag.normal) {
    diagHtml = '<span class="ok-text">✓ All systems normal</span>';
  } else {
    diagHtml = selfDiag.codes
      .filter(c => c.code !== 0x00)
      .map(c => '<div style="color:var(--danger);font-family:var(--mono);font-size:11px">⚠ 0x'
        + c.code.toString(16).toUpperCase() + ' — ' + esc(c.description) + '</div>')
      .join('');
  }

  // Temperature (2's complement, 0.5°C per step)
  let tempHtml = '—';
  if (tempSensor && !tempSensor.error && tempSensor.current != null) {
    const raw = tempSensor.current;
    const signed = raw > 0x7FFF ? raw - 0x10000 : raw;
    const celsius = (signed * 0.5).toFixed(1);
    const color = signed > 70 ? 'var(--danger)' : signed > 55 ? 'var(--warn)' : 'var(--accent)';
    tempHtml = '<span style="color:' + color + '">' + celsius + ' °C</span>';
  }

  // Ambient light
  let luxHtml = '—';
  if (ambientLight && !ambientLight.error && ambientLight.current != null) {
    luxHtml = '<span style="color:var(--text)">' + ambientLight.current + ' lux</span>';
  }

  // Power mode
  let pmHtml = '—';
  if (powerMode && !powerMode.error && powerMode.current != null) {
    const pm = powerMode.current;
    const pmColor = pm === 1 ? 'var(--accent)' : (pm <= 3 ? 'var(--warn)' : 'var(--muted)');
    pmHtml = '<span style="color:' + pmColor + '">' + (POWER_MODE_LABELS[pm] ?? '0x' + pm.toString(16)) + '</span>';
  }

  document.getElementById('card-diag').innerHTML = `
  <div class="card-header"><h2>Diagnostics</h2>
    <button class="btn-secondary" onclick="refreshDiag()">↻ Refresh</button>
  </div>
  <div class="card-body">
    <div class="settings-grid" style="margin-bottom:12px">
      <div class="setting-item"><label>Power Mode</label><div class="val">${pmHtml}</div></div>
      <div class="setting-item"><label>Temperature</label><div class="val">${tempHtml}</div></div>
      <div class="setting-item"><label>Ambient Light</label><div class="val">${luxHtml}</div></div>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Self-Diagnosis</div>
    <div id="diag-body">${diagHtml}</div>
  </div>`;
}

async function refreshDiag() {
  try {
    const [diag, temp, lux, pm] = await Promise.allSettled([
      api('/self-diagnosis'),
      api('/vcp/get', { opPage: 0x02, opCode: 0x79 }),
      api('/vcp/get', { opPage: 0x02, opCode: 0xB4 }),
      api('/vcp/get', { opPage: 0x00, opCode: 0xD6 }),
    ]);
    renderDiag(
      diag.status === 'fulfilled' ? diag.value : { error: diag.reason?.message },
      temp.status === 'fulfilled' ? temp.value : null,
      lux.status  === 'fulfilled' ? lux.value  : null,
      pm.status   === 'fulfilled' ? pm.value   : null,
    );
  } catch(e) { alert('Diagnostics refresh failed: ' + e.message); }
}

async function startScan() {
  const selEl    = document.getElementById('scan-subnet');
  const custom   = document.getElementById('scan-custom')?.value?.trim();
  const portEl   = document.getElementById('scan-port');
  const statusEl = document.getElementById('scan-status');
  const resEl    = document.getElementById('scan-results');
  const subnet   = custom || selEl?.value;
  const port     = parseInt(portEl?.value ?? '7142', 10);

  if (!subnet) { alert('Enter a subnet (e.g. 192.168.1)'); return; }
  statusEl.textContent = 'Scanning…';
  resEl.innerHTML = '<span style="color:var(--muted);font-family:var(--mono);font-size:11px">Probing 254 hosts — this takes a few seconds…</span>';

  try {
    const { results } = await api('/scan', { subnet, port });
    statusEl.textContent = results.length + ' host(s) found';
    if (results.length === 0) {
      resEl.innerHTML = '<span style="color:var(--muted);font-family:var(--mono);font-size:11px">No NEC monitors found on ' + esc(subnet) + '.x:' + port + '</span>';
      return;
    }
    resEl.innerHTML = '<div class="flex-gap" style="flex-wrap:wrap">'
      + results.map(r => {
          const pw = r.power;
          const isOn = pw === 1 || pw === 'on';
          const isOff = pw === 4 || pw === 5 || pw === 'off';
          const btnClass = isOn ? 'btn-primary' : isOff ? 'btn-secondary' : 'btn-secondary';
          const dot = isOn ? '<span style="color:var(--accent)">●</span> '
                    : isOff ? '<span style="color:var(--muted)">○</span> '
                    : '<span style="color:var(--warn)">◌</span> ';
          const pwLabel = typeof pw === 'number' ? ({ 1:'On',2:'Standby',3:'Suspend',4:'Off',5:'Hard Off' }[pw] ?? '?') : (pw ?? '?');
          return '<button class="' + btnClass + '" onclick="connectTo(\'' + r.host + '\',' + r.port + ')" '
            + 'style="min-width:200px;text-align:left">'
            + dot + esc(r.host) + ' <span style="opacity:.6;font-size:10px">(' + pwLabel + ')</span></button>';
        }).join('\n')
      + '</div>';
  } catch(e) {
    statusEl.textContent = 'Error';
    resEl.innerHTML = '<span class="error-text">' + esc(e.message) + '</span>';
  }
}

function connectTo(host, port) {
  const hostEl = document.getElementById('inp-host');
  const portEl = document.getElementById('inp-port');
  if (hostEl) hostEl.value = host;
  if (portEl) portEl.value = port;
  connect();
}

                 padding:4px 6px;border-radius:3px;font-family:var(--mono);font-size:11px">
          <option value="17">HDMI1</option>
          <option value="18">HDMI2</option>
          <option value="15">DisplayPort1</option>
          <option value="16">DisplayPort2</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:10px;color:var(--muted)">Slide interval:</span>
        <input type="number" id="player-interval" value="30" min="5" max="99999"
          style="width:60px;background:var(--bg);border:1px solid var(--border);color:var(--text);
                 padding:4px 6px;border-radius:3px;font-family:var(--mono);font-size:11px">
        <span style="font-size:10px;color:var(--muted)">sec (∞ for single-file)</span>
      </div>

    <div id="player-folder-btns" class="flex-gap" style="flex-wrap:wrap;margin-bottom:10px">
      <span style="color:var(--muted);font-size:11px">Loading folders…</span>

      <button class="btn-warn" onclick="doPlayerStop()" id="player-btn-stop">■ Off</button>

  </div>`;

  // Auto-load folder list if a TV IP is already known
  if (tvIP) loadPlayerFolders(tvIP);
}

async function refreshPlayerFolder() {
  const tvIP = document.getElementById('player-tv-ip')?.value?.trim();
  if (!tvIP) { alert('Enter a TV IP'); return; }
  const el = document.getElementById('player-current-folder');
  el.textContent = 'reading…';
  try {
    const r = await api('/player/folder', { tvIP });
    el.textContent = r.folder ?? 'unknown';
  } catch(e) { el.textContent = 'error: ' + e.message; }
}

/** Rebuild the folder button strip from the current playerFolders array. */
function renderPlayerFolderButtons() {
  const el = document.getElementById('player-folder-btns');
  if (!el) return;
  if (playerFolders.length === 0) {
    el.innerHTML = '<span style="color:var(--muted);font-size:11px">No folders found — enter TV IP and click ↻ Folders</span>';
    return;
  }
  el.innerHTML = playerFolders.map((f, i) => `
    <button class="btn-secondary" onclick="doPlayFolder(${i})"
      id="player-btn-${i}" style="min-width:80px" title="${esc(f)}">▶ ${esc(f)}</button>
  `).join('');
}

/** Fetch folder list from the player and refresh the button strip. */
async function loadPlayerFolders(tvIP) {
  tvIP = tvIP || document.getElementById('player-tv-ip')?.value?.trim();
  if (!tvIP) { alert('Enter a TV IP first'); return; }
  const el = document.getElementById('player-folder-btns');
  if (el) el.innerHTML = '<span style="color:var(--muted);font-size:11px">Loading folders…</span>';
  try {
    const r = await api('/player/folders', { tvIP });
    playerFolders = r.folders || [];
    renderPlayerFolderButtons();
  } catch(e) {
    if (el) el.innerHTML = `<span class="error-text">✗ ${esc(e.message)}</span>`;
  }
}

async function doPlayFolder(idx) {
  const folder       = playerFolders[idx];
  if (folder === undefined) return;
  const tvIP         = document.getElementById('player-tv-ip')?.value?.trim();
  const restoreInput = parseInt(document.getElementById('player-restore-input')?.value ?? '17', 10);
  const interval     = parseInt(document.getElementById('player-interval')?.value ?? '30', 10);
  const resultEl     = document.getElementById('player-result');
  if (!tvIP) { alert('Enter a TV IP first'); return; }

  // Reset all folder buttons, mark this one pending
  playerFolders.forEach((_, i) => {
    const b = document.getElementById(`player-btn-${i}`);
    if (b) b.className = 'btn-secondary';
  });
  const activeBtn = document.getElementById(`player-btn-${idx}`);
  if (activeBtn) activeBtn.className = 'btn-warn';

  resultEl.innerHTML = `<span style="color:var(--muted)">Checking folder contents…</span>`;
  try {
    const r = await api('/player/play', { tvIP, folder, restoreInput, interval });
    if (!r.ok) {
      if (activeBtn) activeBtn.className = 'btn-secondary';
      resultEl.innerHTML = `<span class="error-text">✗ ${esc(r.error ?? 'failed')}</span>`;
      return;
    }
    if (activeBtn) activeBtn.className = 'btn-primary';
    const intervalStr = r.interval >= 99999 ? '∞' : r.interval + 's';
    document.getElementById('player-current-folder').textContent = folder;
    resultEl.innerHTML = `<span class="ok-text">✓ Playing: ${esc(folder)} — ${r.fileCount} file(s), ${intervalStr}/slide</span>`;
  } catch(e) {
    if (activeBtn) activeBtn.className = 'btn-secondary';
    resultEl.innerHTML = `<span class="error-text">${esc(e.message)}</span>`;
  }
}

async function doPlayerStop() {
  const tvIP         = document.getElementById('player-tv-ip')?.value?.trim();
  const restoreInput = parseInt(document.getElementById('player-restore-input')?.value ?? '17', 10);
  const resultEl     = document.getElementById('player-result');
  if (!tvIP) { alert('Enter a TV IP first'); return; }

  playerFolders.forEach((_, i) => {
    const b = document.getElementById(`player-btn-${i}`);
    if (b) b.className = 'btn-secondary';
  });

  resultEl.innerHTML = `<span style="color:var(--muted)">Turning off autoplay…</span>`;
  try {
    const r = await api('/player/stop', { sessionId, tvIP, restoreInput });
    resultEl.innerHTML = r.ok
      ? `<span class="ok-text">✓ Autoplay off — input restored</span>`
      : `<span class="error-text">Error: ${esc(JSON.stringify(r))}</span>`;
  } catch(e) {
    resultEl.innerHTML = `<span class="error-text">${esc(e.message)}</span>`;
  }
}

// ─── information osd ──────────────────────────────────────────────────────────
// VCP page 0x02, code 0x3D
// 0 = disable OSD overlay, 3–10 = display duration in seconds

function renderOsd(infoOsd) {
  const current    = infoOsd && infoOsd.current != null ? infoOsd.current : null;
  const isDisabled = current === 0;
  const timerVal   = (current !== null && current > 0) ? current : 5;
  const stateHtml  = current === null
    ? '<span style="color:var(--muted)">unknown — click Refresh</span>'
    : isDisabled
      ? '<span style="color:var(--warn)">Disabled</span>'
      : '<span style="color:var(--accent)">Enabled (' + current + 's)</span>';

  document.getElementById('card-osd').innerHTML = `
  <div class="card-header"><h2>Information OSD</h2>
    <button class="btn-secondary" onclick="refreshOsd()">↻ Refresh</button>
  </div>
  <div class="card-body">
    <p style="font-size:11px;color:var(--muted);margin:0 0 10px">
      Controls the on-screen overlay shown when switching inputs (source name, IP address, etc.).
      Disable for everyday use; enable temporarily for diagnostics.
    </p>
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:10px">
      Current state: ${stateHtml}
    </div>
    <div class="flex-gap" style="align-items:center">
      <button class="btn-danger" onclick="setOsd(0)">✕ Disable OSD</button>
      <button class="btn-primary" onclick="setOsdTimer()">✓ Enable</button>
      <input type="number" id="osd-timer" value="${timerVal}" min="3" max="10"
             style="width:52px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:3px;font-family:var(--mono);font-size:12px">
      <span style="font-size:11px;color:var(--muted)">seconds (3–10)</span>
      <span id="osd-result"></span>
    </div>
  </div>`;
}

async function refreshOsd() {
  try {
    const r = await api('/vcp/get', { opPage: 0x02, opCode: 0x3D });
    renderOsd({ current: r.current, max: r.max });
  } catch(e) { alert('OSD refresh failed: ' + e.message); }
}

async function setOsd(value) {
  const el = document.getElementById('osd-result');
  try {
    await api('/vcp/set', { opPage: 0x02, opCode: 0x3D, value, persist: true });
    el.innerHTML = value === 0
      ? '<span class="ok-text">✓ OSD disabled</span>'
      : '<span class="ok-text">✓ OSD set to ' + value + 's</span>';
    await refreshOsd();
  } catch(e) { el.innerHTML = '<span class="error-text">' + esc(e.message) + '</span>'; }
}

async function setOsdTimer() {
  const secs = parseInt(document.getElementById('osd-timer')?.value ?? '5', 10);
  if (secs < 3 || secs > 10) { alert('Timer must be 3–10 seconds'); return; }
  await setOsd(secs);
}

// ─── emergency file upload ────────────────────────────────────────────────────

function renderUpload() {
  // Pre-populate TV IP from current session if connected
  const currentHost = document.getElementById('inp-host')?.value?.trim() || '';
  document.getElementById('card-upload').innerHTML = `
  <div class="card-header"><h2>Emergency Content Upload</h2></div>
  <div class="card-body">
    <p style="font-size:11px;color:var(--muted);margin:0 0 12px">
      Wipes the SD card, creates an <code style="color:var(--accent)">EMERGENCY CONTENTS</code>
      folder, and uploads the selected file. TV will be powered on automatically if off.
    </p>
    <div class="settings-grid" style="margin-bottom:12px">
      <div class="setting-item">
        <label>TV IP</label>
        <input type="text" id="upload-tv-ip" value="${esc(currentHost)}" placeholder="192.168.1.x"
          style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
                 padding:5px 8px;border-radius:3px;font-family:var(--mono);font-size:12px">
      </div>
      <div class="setting-item">
        <label>Files <span style="color:var(--muted);font-size:10px">(video or image, multiple OK — slideshow order = selection order)</span></label>
        <input type="file" id="upload-file" accept="video/*,image/jpeg,image/png" multiple
          style="color:var(--text);font-size:12px">
      </div>
    </div>
    <div class="flex-gap" style="align-items:center">
      <button class="btn-primary" onclick="startUpload()">⬆ Upload</button>
      <div id="upload-progress" style="font-family:var(--mono);font-size:11px;color:var(--muted)"></div>
    </div>
    <div id="upload-result" style="margin-top:10px;font-family:var(--mono);font-size:11px"></div>
  </div>`;
}

async function startUpload() {
  const tvIP   = document.getElementById('upload-tv-ip')?.value?.trim();
  const fileEl = document.getElementById('upload-file');
  const progEl = document.getElementById('upload-progress');
  const resEl  = document.getElementById('upload-result');
  const files  = fileEl?.files;

  if (!tvIP)             { resEl.innerHTML = '<span class="error-text">Enter a TV IP address</span>'; return; }
  if (!files?.length)    { resEl.innerHTML = '<span class="error-text">Select at least one file</span>'; return; }

  resEl.innerHTML = '';
  progEl.textContent = `Reading ${files.length} file(s)…`;
  document.querySelector('#card-upload .btn-primary').disabled = true;

  try {
    // Use native FormData — browser handles boundary/encoding; do NOT set Content-Type.
    const formData = new FormData();
    for (const file of files) formData.append('file', file, file.name);

    const names = Array.from(files).map(f => f.name).join(', ');
    progEl.textContent = `Uploading ${files.length} file(s): ${names} — powering on TV if needed, please wait…`;

    const params = new URLSearchParams({ tvIP });
    const resp = await fetch('/api/emergency-upload?' + params.toString(), {
      method: 'POST',
      body: formData,
    });
    const json = await resp.json();
    if (json.error) throw new Error(json.error);

    progEl.textContent = '';
    const fileList = json.files.map((f, i) =>
      `  ${i+1}. ${esc(f.filename)} (${f.bytes} bytes)`
    ).join('<br>');
    resEl.innerHTML = `<span class="ok-text">✓ ${json.files.length} file(s) uploaded<br>` +
      `TV: ${esc(json.tvIP)}  Player: ${esc(json.playerIP)}<br>` +
      `Folder: ${esc(json.folder)}<br>${fileList}</span>`;
  } catch (e) {
    progEl.textContent = '';
    resEl.innerHTML = '<span class="error-text">✗ ' + esc(e.message) + '</span>';
  } finally {
    document.querySelector('#card-upload .btn-primary').disabled = false;
  }
}

// ─── asset manager ────────────────────────────────────────────────────────────

let amTab   = 'assets';  // 'assets' | 'groups' | 'devices'
let amReg   = null;      // { groups: {id→{name,assets[]}}, devices: {mac→{…}} }
let amItems = [];        // cached asset array

async function loadAssetManager() {
  const el = document.getElementById('card-cache');
  if (!el) return;
  try {
    const [reg, { items }] = await Promise.all([
      api('/registry', null, 'GET'),
      api('/cache',    null, 'GET'),
    ]);
    amReg   = reg;
    amItems = items || [];
  } catch(e) {
    el.innerHTML =
      `<div class="card-header"><h2>Asset Manager</h2></div>` +
      `<div class="card-body"><span class="error-text">Load failed: ${esc(e.message)}</span></div>`;
    return;
  }
  renderAssetManager();
}

function renderAssetManager() {
  const el = document.getElementById('card-cache');
  if (!el) return;
  const gc = Object.keys(amReg?.groups  || {}).length;
  const dc = Object.keys(amReg?.devices || {}).length;
  el.innerHTML = `
  <div class="card-header">
    <h2>Asset Manager</h2>
    <div class="flex-gap">
      <button class="${amTab==='assets'  ? 'btn-primary':'btn-secondary'}"
        style="font-size:11px;padding:3px 10px" onclick="amSetTab('assets')">
        Assets&nbsp;(${amItems.length})</button>
      <button class="${amTab==='groups'  ? 'btn-primary':'btn-secondary'}"
        style="font-size:11px;padding:3px 10px" onclick="amSetTab('groups')">
        Groups&nbsp;(${gc})</button>
      <button class="${amTab==='devices' ? 'btn-primary':'btn-secondary'}"
        style="font-size:11px;padding:3px 10px" onclick="amSetTab('devices')">
        Devices&nbsp;(${dc})</button>
      <button class="btn-secondary" style="font-size:11px;padding:3px 8px"
        onclick="loadAssetManager()">↺</button>
    </div>
  </div>
  <div class="card-body" id="am-body" style="gap:0;padding:12px 16px"></div>`;
  const body = document.getElementById('am-body');
  if (amTab === 'assets')  renderAmAssets(body);
  if (amTab === 'groups')  renderAmGroups(body);
  if (amTab === 'devices') renderAmDevices(body);
}

function amSetTab(tab) { amTab = tab; renderAssetManager(); }

// ── Assets tab ────────────────────────────────────────────────────────────────

function renderAmAssets(body) {
  // Reverse map: sha256 → [groupId, ...]
  const assetGroups = {};
  for (const [gid, grp] of Object.entries(amReg?.groups || {})) {
    for (const h of grp.assets) {
      (assetGroups[h] = assetGroups[h] || []).push(gid);
    }
  }
  const allGids = Object.keys(amReg?.groups || {});

  const isImage = mime => mime && mime.startsWith('image/');

  body.innerHTML = `
  <div style="margin-bottom:10px">
    <label class="btn-secondary" style="cursor:pointer;font-size:11px;padding:3px 10px">
      ＋ Upload
      <input type="file" id="am-file-input" accept="video/*,image/jpeg,image/png"
        multiple style="display:none" onchange="amStoreFiles(this)">
    </label>
  </div>
  <div id="am-assets-list">
    ${amItems.length === 0
      ? '<span style="color:var(--muted);font-size:12px">No cached assets yet.</span>'
      : `<div class="asset-grid">` + amItems.map(item => {
          const gids = assetGroups[item.sha256] || [];
          const h8   = item.sha256.slice(0, 8);
          const thumbUrl = `/api/cache/${item.sha256}/file`;
          const thumb = isImage(item.mime)
            ? `<img class="asset-thumb" src="${thumbUrl}" alt="${esc(item.originalName)}"
                    loading="lazy" onclick="openLightbox('${thumbUrl}')">`
            : `<div class="asset-thumb-placeholder" title="${esc(item.originalName)}">▶</div>`;
          const groupBadges =
            '<span class="badge badge-grey">all</span>' +
            gids.map(gid =>
              `<span class="badge badge-blue" style="cursor:default">
                ${esc(amReg.groups[gid]?.name || gid)}
                <button onclick="amRemoveFromGroup('${item.sha256}','${gid}')"
                  style="background:none;border:none;color:inherit;cursor:pointer;
                  padding:0 0 0 3px;font-size:10px;line-height:1">×</button>
              </span>`
            ).join('');
          const available = allGids.filter(g => !gids.includes(g));
          const tagCtrl = available.length ? `
            <select id="am-grpsel-${h8}"
              style="font-size:10px;padding:2px 4px;background:var(--bg-input);
              color:var(--text);border:1px solid var(--border);border-radius:3px">
              <option value="">＋ Tag…</option>
              ${available.map(g =>
                `<option value="${g}">${esc(amReg.groups[g].name)}</option>`
              ).join('')}
            </select>
            <button class="btn-secondary" style="font-size:10px;padding:2px 6px"
              onclick="amTagFromSelect('${item.sha256}','${h8}')">Tag</button>` : '';
          return `
          <div class="asset-card">
            ${thumb}
            <div class="asset-card-body">
              <div class="asset-name" title="${esc(item.displayName)}">${esc(item.originalName)}</div>
              <div class="asset-meta">${(item.size/1024).toFixed(1)} KB · ${new Date(item.cachedAt).toLocaleDateString()}</div>
              <div style="display:flex;gap:3px;flex-wrap:wrap;align-items:center;margin-top:3px">
                ${groupBadges}${tagCtrl}
              </div>
              <button class="btn-secondary"
                style="font-size:9px;padding:1px 6px;color:var(--danger);margin-top:4px;align-self:flex-start"
                onclick="amDeleteAsset('${item.sha256}')">✕ Remove</button>
            </div>
          </div>`;
        }).join('') + `</div>`}
  </div>`;
}

function openLightbox(url) {
  const lb  = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = url;
  lb.classList.add('open');
}

function closeLightbox(e) {
  // close on backdrop click (not on img itself) or explicit call
  if (e && e.target === document.getElementById('lightbox-img')) return;
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

function amTagFromSelect(hash, h8) {
  const sel = document.getElementById('am-grpsel-' + h8);
  if (!sel || !sel.value) return;
  amAddToGroup(hash, sel.value);
}

async function amStoreFiles(input) {
  const files = input.files;
  if (!files.length) return;
  const body = document.getElementById('am-body');
  if (body) body.innerHTML =
    `<span style="color:var(--muted);font-size:12px">Storing ${files.length} file(s)…</span>`;
  const fd = new FormData();
  for (const f of files) fd.append('file', f, f.name);
  try {
    const resp = await fetch('/api/cache/store', { method: 'POST', body: fd });
    const json = await resp.json();
    if (json.error) throw new Error(json.error);
    input.value = '';
    await loadAssetManager();
  } catch(e) {
    if (body) body.innerHTML = '<span class="error-text">✗ ' + esc(e.message) + '</span>';
  }
}

async function amDeleteAsset(hash) {
  if (!confirm('Remove this asset from the cache?')) return;
  try {
    const r = await fetch('/api/cache/' + hash, { method: 'DELETE' });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

async function amAddToGroup(hash, groupId) {
  try {
    const r = await api('/groups/' + groupId + '/assets', { hashes: [hash] });
    if (r.error) throw new Error(r.error);
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

async function amRemoveFromGroup(hash, groupId) {
  try {
    const r = await fetch('/api/groups/' + groupId + '/assets/' + hash, { method: 'DELETE' });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

// ── Groups tab ────────────────────────────────────────────────────────────────

function renderAmGroups(body) {

  <div class="form-row" style="margin-bottom:14px">

async function amCreateGroup() {
  const inp  = document.getElementById('am-new-grp');
  const name = inp?.value.trim();
  if (!name) { alert('Enter a group name.'); return; }
  try {
    const r = await api('/groups', { name });
    if (r.error) throw new Error(r.error);
    inp.value = '';
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

async function amRenameGroup(id) {
  const inp  = document.getElementById('am-ren-' + id);
  const name = inp?.value.trim();
  if (!name) { alert('Name cannot be empty.'); return; }
  try {
    const r = await fetch('/api/groups/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

async function amDeleteGroup(id) {
  const grp = amReg?.groups?.[id];
  if (!confirm(`Delete group "${grp?.name}"? Assets remain cached; only the grouping is removed.`)) return;
  try {
    const r = await fetch('/api/groups/' + id, { method: 'DELETE' });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

// ── Devices tab ────────────────────────────────────────────────────────────────

function renderAmDevices(body) {
  const devices = Object.entries(amReg?.devices || {}).map(([mac, d]) => ({ mac, ...d }));
  const groups  = amReg?.groups || {};
  const allGids = Object.keys(groups);

  body.innerHTML = `
  <div style="background:var(--bg);border:1px solid var(--border);border-radius:5px;
       padding:12px;margin-bottom:14px">
    <div style="font-family:var(--mono);font-size:10px;color:var(--muted);
         text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Register Device</div>
    <div class="form-row">
      <div class="form-group" style="flex:1;min-width:150px">
        <label>TV MAC (from NEC interrogation)</label>
        <input type="text" id="am-reg-mac" placeholder="aa:bb:cc:dd:ee:ff">
      </div>
      <div class="form-group" style="flex:1;min-width:120px">
        <label>Device name</label>
        <input type="text" id="am-reg-name" placeholder="Lobby TV">
      </div>
      <div class="form-group" style="min-width:130px">
        <label>TV IP address</label>
        <input type="text" id="am-reg-ip" placeholder="192.168.100.198">
      </div>
      <div style="display:flex;gap:6px;align-self:flex-end">
        <button class="btn-primary" style="font-size:11px;padding:4px 12px"
          onclick="amRegisterDevice()">＋ Register</button>
        ${sessionId ? `
        <button class="btn-secondary" style="font-size:11px;padding:4px 10px"
          onclick="amFillFromSession()" title="Copy MAC + IP from current TV session">
          Use current TV
        </button>` : ''}
      </div>
    </div>
  </div>
  ${devices.length === 0
    ? '<div style="color:var(--muted);font-size:12px">No devices registered yet.</div>'
    : devices.map(dev => {
        const devGids = dev.groups || [];
        const macId   = dev.mac.replace(/:/g, '');
        const groupBadges = devGids.map(gid => {
          const name = gid === 'all' ? 'all' : (groups[gid]?.name || gid);
          const cls  = gid === 'all' ? 'badge-grey' : 'badge-blue';
          return `<span class="badge ${cls}" style="cursor:default">
            <span onclick="amPlayGroup('${dev.tvIp}','${gid}','${macId}','${dev.mac}')"
              style="cursor:pointer;display:flex;align-items:center;gap:3px" title="▶ Play ${esc(name)} now">
              <span style="font-size:9px">▶</span>
              ${esc(name)}
            </span>
            <button onclick="amUnassignGroup('${dev.mac}','${gid}')"
              style="background:none;border:none;color:inherit;cursor:pointer;
              padding:0 0 0 3px;font-size:10px;line-height:1" title="Remove">×</button>
          </span>`;
        }).join('');
        const unassigned = ['all', ...allGids].filter(g => !devGids.includes(g));
        const assignCtrl = unassigned.length ? `
          <select id="am-agrp-${macId}"
            style="font-size:10px;padding:2px 4px;background:var(--bg-input);
            color:var(--text);border:1px solid var(--border);border-radius:3px">
            <option value="">＋ Assign…</option>
            ${unassigned.map(g =>
              `<option value="${g}">${g === 'all' ? 'all' : esc(groups[g]?.name || g)}</option>`
            ).join('')}
          </select>
          <button class="btn-secondary" style="font-size:10px;padding:2px 6px"
            onclick="amAssignFromSelect('${dev.mac}','${macId}')">Assign</button>` : '';
        const pushRow = devGids.length ? `
          <div style="display:flex;gap:6px;align-items:center;margin-top:8px;
               padding-top:8px;border-top:1px solid var(--border)">
            <button class="btn-primary" style="font-size:10px;padding:2px 10px"
              onclick="amPushAll('${dev.mac}','${macId}')">⬆ Push all groups</button>
            <span id="am-pst-${macId}" style="font-size:10px;color:var(--muted)"></span>
          </div>` : '';
        return `
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:5px;
             margin-bottom:8px;overflow:hidden">
          <div style="display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer;
               background:var(--surface);border-bottom:1px solid var(--border)"
               onclick="toggleDeviceExpand('${dev.mac}')">
            <span style="font-size:11px;color:var(--muted)">▼</span>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:baseline;gap:10px">
                <span style="font-size:13px;font-weight:600;color:var(--text)">
                  ${esc(dev.name || dev.mac)}</span>
                <span id="am-dev-status-${macId}" style="font-size:10px;color:var(--muted)">
                  ○ unknown</span>
              </div>
            </div>
            <div style="display:flex;gap:4px;flex-shrink:0">
              <button class="btn-secondary" style="font-size:10px;padding:2px 8px"
                onclick="amEditDevice('${dev.mac}'); event.stopPropagation();">Edit</button>
              <button class="btn-secondary"
                style="font-size:10px;padding:2px 8px;color:var(--danger)"
                onclick="amDeleteDevice('${dev.mac}'); event.stopPropagation();">Remove</button>
            </div>
          </div>
          <div id="am-dev-content-${macId}" style="display:none;padding:12px;border-top:1px solid var(--border)">
            ${dev.tvIp
              ? `<div style="font-size:10px;color:var(--muted);margin-bottom:8px">
                   TV&nbsp;IP: ${esc(dev.tvIp)}</div>` : ''}
            <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">
              MAC: ${esc(dev.mac)}</span>
            <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-top:8px;margin-bottom:8px">
              ${groupBadges}
              ${devGids.length ? `<button class="btn-warn"
                style="font-size:10px;padding:1px 8px;border-radius:10px"
                onclick="amPlayerOff('${dev.tvIp || ''}','${macId}','${dev.mac}')"
                title="Turn off autoplay">■ Off</button>` : ''}
              ${assignCtrl}
            </div>
            ${pushRow}
          </div>
        </div>`;
      }).join('')}`;
}

function amFillFromSession() {
  const macData = lastData?.mac;
  const mac = (typeof macData === 'string') ? macData : macData?.mac;
  const ip  = document.getElementById('inp-host')?.value;
  if (mac) { const el = document.getElementById('am-reg-mac');  if (el) el.value = mac; }
  if (ip)  { const el = document.getElementById('am-reg-ip');   if (el) el.value = ip;  }
}

async function amRegisterDevice() {
  const mac  = document.getElementById('am-reg-mac')?.value.trim();
  const name = document.getElementById('am-reg-name')?.value.trim();
  const tvIp = document.getElementById('am-reg-ip')?.value.trim();
  if (!mac)  { alert('TV MAC address is required.'); return; }
  if (!name) { alert('Device name is required.'); return; }
  try {
    const r = await api('/devices', { tvMac: mac, name, ...(tvIp ? { tvIp } : {}) });
    if (r.error) throw new Error(r.error);
    document.getElementById('am-reg-mac').value  = '';
    document.getElementById('am-reg-name').value = '';
    document.getElementById('am-reg-ip').value   = '';
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

async function amEditDevice(mac) {
  const dev  = amReg?.devices?.[mac];
  if (!dev) return;
  const name = prompt('Device name:', dev.name || '');
  if (name === null) return;
  const tvIp = prompt('TV IP address:', dev.tvIp || '');
  if (tvIp === null) return;
  try {
    const r = await fetch('/api/devices/' + mac, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim(), tvIp: tvIp.trim() }),
    });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

async function amDeleteDevice(mac) {
  const dev = amReg?.devices?.[mac];
  if (!confirm(`Remove "${dev?.name || mac}" from the device registry?`)) return;
  try {
    const r = await fetch('/api/devices/' + mac, { method: 'DELETE' });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

async function amAssignFromSelect(mac, macId) {
  const sel = document.getElementById('am-agrp-' + macId);
  if (!sel || !sel.value) return;
  try {
    const r = await api('/devices/' + mac + '/groups', { groupId: sel.value });
    if (r.error) throw new Error(r.error);
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

async function amUnassignGroup(mac, groupId) {
  try {
    const r = await fetch('/api/devices/' + mac + '/groups/' + groupId, { method: 'DELETE' });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    await loadAssetManager();
  } catch(e) { alert('Error: ' + e.message); }
}

async function amPlayGroup(tvIp, gid, macId, mac) {
  const groups = amReg?.groups || {};
  const folder = gid === 'all' ? 'all' : (groups[gid]?.name || gid);
  const stEl   = document.getElementById('am-pst-' + macId);
  if (stEl) stEl.textContent = `Setting autoplay "${folder}"…`;
  try {
    const r = await api('/player/play', { sessionId, tvIP: tvIp || '', folder, mac });
    if (r.error) throw new Error(r.error);
    if (stEl) stEl.innerHTML = r.applied
      ? `<span class="ok-text">▶ Now playing "${esc(folder)}"</span>`
      : `<span style="color:var(--accent2)">⏱ "${esc(folder)}" queued • will play when device online</span>`;
  } catch(e) {
    if (stEl) stEl.innerHTML = `<span class="error-text">✗ ${esc(e.message)}</span>`;
    else alert('Play error: ' + e.message);
  }
}

async function amPlayerOff(tvIp, macId, mac) {
  const stEl = document.getElementById('am-pst-' + macId);
  if (stEl) stEl.textContent = 'Setting autoplay off…';
  try {
    const r = await api('/player/stop', { sessionId, tvIP: tvIp || '', mac });
    if (r.error) throw new Error(r.error);
    if (stEl) stEl.innerHTML = r.applied
      ? `<span class="ok-text">■ Autoplay off</span>`
      : `<span style="color:var(--accent2)">⏱ Off queued • will apply when device online</span>`;
  } catch(e) {
    if (stEl) stEl.innerHTML = `<span class="error-text">✗ ${esc(e.message)}</span>`;
    else alert('Off error: ' + e.message);
  }
}

async function amPushAll(mac, macId) {
  const stEl = document.getElementById('am-pst-' + macId);
  if (stEl) stEl.textContent = 'Pushing all groups…';
  try {
    const r = await api('/devices/' + mac + '/push-all', {});
    if (r.error) throw new Error(r.error);
    const lines = (r.results || []).map(res => {
      if (res.status === 'pushed')
        return `<span class="ok-text">✓ ${esc(res.folder)} (${res.files?.length ?? '?'} file(s))</span>`;
      if (res.status === 'up-to-date')
        return `<span class="ok-text">= ${esc(res.folder)}</span>`;
      return `<span style="color:var(--muted)">⚠ ${esc(res.folder)}: ${esc(res.reason || res.status)}</span>`;
    });
    if (stEl) stEl.innerHTML = lines.join(' &nbsp;·&nbsp; ') || '<span class="ok-text">✓ done</span>';
  } catch(e) {
    if (stEl) stEl.innerHTML = `<span class="error-text">✗ ${esc(e.message)}</span>`;
    else alert('Push error: ' + e.message);
  }
}

// ─── util ────────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Initialise on DOM ready
document.addEventListener('DOMContentLoaded', () => {
  renderScanner();
  // Initialise cache card - independent of TV session
  const cacheDiv = document.createElement('div');
  cacheDiv.className = 'card';
  cacheDiv.id = 'card-cache';
  document.getElementById('scanner-wrap').appendChild(cacheDiv);
  loadAssetManager();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
